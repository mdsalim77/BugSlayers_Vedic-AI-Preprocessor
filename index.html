<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vedic AI Preprocessor · BugSlayers</title>
    <!-- Chart.js for performance comparison -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            margin: 0;
            padding: 0;
        }
        body {
            background: #f8fafc;
            padding: 2rem 1.5rem;
            color: #0f172a;
        }
        .container {
            max-width: 1300px;
            margin: 0 auto;
        }
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .logo h1 {
            font-size: 2.2rem;
            font-weight: 600;
            background: linear-gradient(135deg, #2e1a47, #b91c1c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }
        .logo p {
            color: #334155;
            font-weight: 400;
            margin-top: 0.2rem;
        }
        .team-badge {
            background: #1e293b;
            color: #f1f5f9;
            padding: 0.6rem 1.4rem;
            border-radius: 40px;
            font-weight: 500;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        .team-badge span {
            color: #facc15;
            font-weight: 700;
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-bottom: 2.5rem;
        }
        .card {
            background: white;
            border-radius: 32px;
            padding: 1.8rem 2rem;
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.05), 0 8px 10px -6px rgb(0 0 0 / 0.05);
            border: 1px solid #e2e8f0;
            transition: 0.2s;
        }
        .card:hover {
            border-color: #cbd5e1;
        }
        .card h2 {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-weight: 600;
            font-size: 1.8rem;
            margin-bottom: 1.5rem;
            color: #0f172a;
            border-bottom: 3px solid #f1f5f9;
            padding-bottom: 0.75rem;
        }
        .card h2 i {
            font-size: 2rem;
        }
        .input-group {
            margin-bottom: 1.8rem;
        }
        label {
            font-weight: 500;
            display: block;
            margin-bottom: 0.4rem;
            color: #334155;
        }
        input, textarea {
            width: 100%;
            padding: 0.9rem 1.2rem;
            font-size: 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 24px;
            outline: none;
            transition: 0.15s;
            background: #f8fafc;
        }
        input:focus, textarea:focus {
            border-color: #b91c1c;
            background: white;
        }
        textarea {
            font-family: monospace;
            resize: vertical;
        }
        .btn {
            background: #0f172a;
            color: white;
            border: none;
            padding: 0.9rem 2rem;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.15s;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            width: 100%;
        }
        .btn:hover {
            background: #2d3a5e;
            transform: scale(1.01);
        }
        .btn-secondary {
            background: #e2e8f0;
            color: #0f172a;
            margin-top: 0.8rem;
            box-shadow: none;
        }
        .btn-secondary:hover {
            background: #cbd5e1;
        }
        .result-box {
            background: #f1f4f9;
            border-radius: 24px;
            padding: 1.5rem;
            margin-top: 1.8rem;
            border-left: 6px solid #b91c1c;
        }
        .result-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.8rem;
            font-size: 1.1rem;
        }
        .badge {
            background: #0f172a;
            color: white;
            border-radius: 30px;
            padding: 0.2rem 1rem;
            font-weight: 500;
            font-size: 0.9rem;
        }
        .time-compare {
            display: flex;
            gap: 2rem;
            margin: 1rem 0 0.5rem;
            flex-wrap: wrap;
        }
        .time-card {
            background: white;
            border-radius: 20px;
            padding: 0.8rem 1.5rem;
            text-align: center;
            flex: 1;
            border: 1px solid #e2e8f0;
        }
        .time-value {
            font-size: 1.6rem;
            font-weight: 700;
            color: #b91c1c;
        }
        canvas {
            max-height: 200px;
            margin: 1rem 0;
        }
        .footer-note {
            background: #fef9c3;
            border-radius: 40px;
            padding: 1.2rem 2rem;
            text-align: center;
            font-size: 1rem;
            border: 1px solid #facc15;
            color: #1e293b;
        }
        .footer-note strong {
            color: #b91c1c;
        }
        @media (max-width: 800px) {
            .grid { grid-template-columns: 1fr; }
        }
    </style>

</html>
